    <style>
        :root {
            --bg-body: #f4f7f6;
            --bg-card: rgba(255, 255, 255, 0.9);
            --text-main: #2d3436;
            --text-sub: #636e72;
            --footer-bg: #2d3436;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
            --accent-glow: #00b894;
        }

        .dark-mode {
            --bg-body: #0f0f0f;
            --bg-card: rgba(26, 26, 26, 0.9);
            --text-main: #f5f5f5;
            --text-sub: #b2bec3;
            --footer-bg: #000000;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
            --accent-glow: #00cec9;
        }

        body {
            background-image: url('https://surveyheartmedia.s3.ap-south-1.amazonaws.com/files/cd0c33b0594e4433d1a8ca61f11ef7/69622f7e459753fa3e3859ce/sh_1777336104608.jpeg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
        }

        /* Full-screen glass overlay */
        .glass-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.12);
            -webkit-backdrop-filter: blur(10px) saturate(120%);
            backdrop-filter: blur(10px) saturate(120%);
            pointer-events: none;
            z-index: 0;
        }

        /* Put page content above the overlay */
        .content {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-id {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 10px;
            opacity: 0.7;
            letter-spacing: 1px;
            background: var(--bg-card);
            padding: 2px 8px;
            border-radius: 5px;
        }

        .toggle-wrapper {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-glow); }
        input:checked + .slider:before { transform: translateX(20px); }

        .header-container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            margin-top: 40px;
        }

        @keyframes blink-glow {
            0% { box-shadow: 0 0 10px var(--accent-glow); }
            50% { box-shadow: 0 0 20px var(--accent-glow), 0 0 30px var(--accent-glow); }
            100% { box-shadow: 0 0 10px var(--accent-glow); }
        }

        .profile-img {
            width: 160px;
            height: 160px;
            margin: 0 auto;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--bg-card);
            background: #fff;
            animation: blink-glow 2s infinite ease-in-out;
            backdrop-filter: blur(5px);
        }

        .profile-img img { width: 100%; height: 100%; object-fit: cover; }

        
        .info-card {
            text-align: center;
            margin-top: 15px;
            
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
        }

        .info-card h1 { margin: 0; font-size: 22px; font-weight: 700; color: #000; }
        .info-card p { margin: 5px 0; font-size: 16px; color: #000; font-weight: 600; letter-spacing: 1px; }

        .container {
            width: 85%;
            max-width: 380px;
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .slide {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            
            border-radius: 15px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            border-right: 5px solid transparent;
            backdrop-filter: blur(10px);
        }

        .slide:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        .icon { width: 24px; height: 24px; margin-left: 15px; }

        .fb { border-right-color: #1877f2; }
        .ig { border-right-color: #e1306c; }
        .wa { border-right-color: #25d366; }
        .tk { border-right-color: #000000; }
        .ln { border-right-color: #0077b5; }

        footer {
            margin-top: auto;
            width: 100%;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #fff;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }
        footer a { color: #fff; text-decoration: none; font-weight: bold; }

    </style>

    <script>
        const toggle = document.getElementById('darkModeToggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            toggle.checked = true;
        }

        toggle.addEventListener('change', () => {
            if (toggle.checked) {
                body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
